apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-pool
  namespace: openshift-operators
  labels:
    strimzi.io/cluster: kafka-cluster

spec:
  replicas: 1

  roles:
    - broker
    - controller

  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        deleteClaim: false